<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pro Network Blueprint Preview</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="blueprint-shell">
      <section class="blueprint-hero">
        <div class="blueprint-consumer-panel">
          <h1>Route service requests to the right professional team.</h1>
          <p>Fast marketplace intake for property service, repair, install, and field operations.</p>
          <form class="blueprint-search-form">
            <input placeholder="What work needs to be done?">
            <input placeholder="Zip Code">
            <button type="button">Start</button>
          </form>
        </div>
        <aside class="blueprint-pro-panel">
          <h2>Run intake and follow-up from one portal.</h2>
          <p>Manager queues, client updates, files, approvals, and provider placeholders stay ready.</p>
          <button type="button">Join for Free</button>
        </aside>
      </section>
    </main>
  </body>
</html>
