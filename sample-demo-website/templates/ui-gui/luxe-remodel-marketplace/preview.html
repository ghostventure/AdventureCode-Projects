<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luxe Remodel Marketplace Preview</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="luxe-market-shell">
      <section class="luxe-market-hero">
        <div class="luxe-consumer-panel">
          <h1>Match with design pros for a polished home project.</h1>
          <p>Premium intake for remodels, interiors, architecture consults, and project planning.</p>
          <form class="luxe-search-form">
            <input placeholder="What project are you planning?">
            <input placeholder="Zip Code">
            <button type="button">Start</button>
          </form>
        </div>
        <aside class="luxe-pro-panel">
          <h2>Bring your studio into one client portal.</h2>
          <p>Visual CRM, intake, approvals, and project communication before providers are wired.</p>
          <button type="button">Join for Free</button>
        </aside>
      </section>
    </main>
  </body>
</html>
