    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - CLTCHNTWRKSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cltch.ntwrk.swift
        PRODUCT_NAME: CLTCH.NTWRK
