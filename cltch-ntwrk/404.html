<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="The requested CLTCH.NTWRK page could not be found.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/cltch-icon.svg" type="image/svg+xml">
  <title>CLTCH.NTWRK — Page Not Found</title>
  <link rel="stylesheet" href="cltch-boilerplate.css">
  <script src="site-init.js" defer></script>
  <style>
    .not-found-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }
    .not-found {
      width: min(680px, 100%);
      padding: 30px;
      border-radius: 16px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #324661;
      color: #9ab0c9;
      background: rgba(17, 27, 42, 0.7);
      margin-bottom: 14px;
      font-size: 13px;
    }
    .code {
      color: #f5a623;
      font-size: 14px;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      text-transform: uppercase;
      font-weight: 700;
    }
    h1 {
      font-size: clamp(28px, 5.2vw, 44px);
      line-height: 1.08;
      margin-bottom: 12px;
    }
    p {
      color: #a8b6c9;
      margin-bottom: 22px;
      max-width: 58ch;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      text-decoration: none;
      padding: 10px 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="not-found-wrap">
    <section class="not-found card" role="alert" aria-live="polite">
      <div class="pill">Routing Guard</div>
      <div class="code">Error 404</div>
      <h1>That route does not exist.</h1>
      <p>
        The page you requested was not found. Use one of the trusted routes below to get back into CLTCH.NTWRK.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/index.html">Go Home</a>
        <a class="btn" href="/auth.html">Sign In</a>
        <a class="btn" href="/n/index.html">Boilerplate Hub</a>
      </div>
    </section>
  </main>
</body>
</html>
